name: CI/CD Pipeline - Mini Projet Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-app:latest ./app

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-app:latest

    - name: Done
      run: echo "CI/CD terminé avec succès !"